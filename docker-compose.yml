version: '3.9'

services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cloud-db
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - cloud-network

  backend:
    build: ./backend
    container_name: cloud-backend
    ports:
      - "5000:5000"
    environment:
      - DB_SERVER=database
      - DB_USER=sa
      - DB_PASSWORD=YourStrong!Pass123
      - DB_NAME=cloudapp
    depends_on:
      - database
    networks:
      - cloud-network

  frontend:
    build: ./frontend
    container_name: cloud-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge